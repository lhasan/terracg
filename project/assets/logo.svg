<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" width="380" height="72" role="img" aria-label="Terra Consulting Group">
  <defs>
    <style>
      .t1{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:38px;fill:#1a1a1a;letter-spacing:-0.5px}
      .t2{font-family:Georgia,'Times New Roman',serif;font-weight:400;font-size:38px;fill:#1a1a1a;letter-spacing:-0.3px}
      .t3{font-family:Georgia,'Times New Roman',serif;font-weight:400;font-size:16px;fill:#888;letter-spacing:0.2px}
    </style>
  </defs>

  <!-- Yellow circular ring — hand-drawn feel via multiple offset strokes -->
  <g transform="translate(36,36)">
    <!-- outer ring strokes -->
    <circle cx="0" cy="0" r="29" fill="none" stroke="#F2B705" stroke-width="8"  stroke-dasharray="none" opacity="0.85"/>
    <circle cx="1" cy="-1" r="26" fill="none" stroke="#F2B705" stroke-width="5" opacity="0.7"/>
    <circle cx="-1" cy="1" r="23" fill="none" stroke="#F2B705" stroke-width="4" opacity="0.55"/>
    <circle cx="0.5" cy="0.5" r="20" fill="none" stroke="#F5C520" stroke-width="3" opacity="0.4"/>
    <!-- inner fill suggestion -->
    <circle cx="0" cy="0" r="14" fill="#FFFBF0" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="84" y="43">
    <tspan class="t1">Terra</tspan><tspan class="t2"> Consulting Group</tspan>
  </text>
  <text x="84" y="63" class="t3">Business Consulting &amp; Advisory</text>
</svg>
